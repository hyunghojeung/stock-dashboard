<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시작금액별 1천만원 도달 비교 차트</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0f1e; color:#e0e6f0; font-family:'Noto Sans KR','Segoe UI',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .container { max-width:900px; width:100%; }
  h1 { font-size:20px; font-weight:700; margin-bottom:6px; }
  .sub { font-size:12px; color:#6688aa; margin-bottom:24px; }
  .chart-wrap { background:linear-gradient(135deg,rgba(25,35,65,0.9),rgba(15,22,48,0.95)); border:1px solid rgba(100,140,200,0.15); border-radius:12px; padding:24px; margin-bottom:20px; }
  canvas { width:100%; }
  .legend { display:flex; flex-wrap:wrap; gap:16px; justify-content:center; margin-top:16px; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:12px; }
  .legend-dot { width:12px; height:12px; border-radius:3px; }
  .table-wrap { background:linear-gradient(135deg,rgba(25,35,65,0.9),rgba(15,22,48,0.95)); border:1px solid rgba(100,140,200,0.15); border-radius:12px; padding:20px; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  th { padding:8px 10px; color:#6688aa; text-align:center; border-bottom:1px solid rgba(100,140,200,0.2); font-size:11px; }
  td { padding:8px 10px; text-align:center; border-bottom:1px solid rgba(100,140,200,0.08); font-family:'JetBrains Mono',monospace; }
  .highlight { color:#4cff8b; font-weight:700; }
  .goal-line { color:#ffd54f; }
</style>
</head>
<body>
<div class="container">
  <h1>📈 시작금액별 1천만원 도달 비교 차트</h1>
  <div class="sub">10일마다 수익률 20% 복리 적용 | 목표: 10,000,000원</div>

  <div class="chart-wrap">
    <canvas id="chart" height="400"></canvas>
    <div class="legend" id="legend"></div>
  </div>

  <div class="table-wrap">
    <table id="dataTable">
      <thead><tr><th>회차 (10일)</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
const STARTS = [1000000, 2000000, 3000000, 4000000, 5000000];
const GOAL = 10000000;
const RATE = 0.20; // 10일마다 20%
const COLORS = ['#ef4444','#f59e0b','#4cff8b','#3b82f6','#a855f7'];
const LABELS = ['100만원','200만원','300만원','400만원','500만원'];

// 데이터 계산
const datasets = STARTS.map(start => {
  const points = [start];
  let v = start;
  while (v < GOAL) {
    v = Math.round(v * (1 + RATE));
    points.push(Math.min(v, GOAL * 1.05)); // 목표 약간 넘는 것까지 표시
    if (v >= GOAL) break;
  }
  return points;
});

const maxRounds = Math.max(...datasets.map(d => d.length));
// 모든 데이터셋을 같은 길이로 맞춤 (도달 후에는 마지막 값 유지)
datasets.forEach(d => {
  while (d.length < maxRounds) d.push(d[d.length - 1]);
});

// 차트 그리기
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;

function drawChart() {
  const rect = canvas.parentElement.getBoundingClientRect();
  const W = rect.width - 48;
  const H = 400;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  const padL = 80, padR = 30, padT = 20, padB = 50;
  const cW = W - padL - padR;
  const cH = H - padT - padB;

  const maxVal = Math.max(GOAL * 1.1, ...datasets.flat());
  const minVal = 0;
  const xCount = maxRounds;

  const toX = i => padL + (i / (xCount - 1)) * cW;
  const toY = v => padT + (1 - (v - minVal) / (maxVal - minVal)) * cH;

  // 배경 그리드
  ctx.strokeStyle = 'rgba(50,70,100,0.3)';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([4, 4]);
  const gridVals = [2000000, 4000000, 6000000, 8000000, 10000000, 12000000];
  gridVals.forEach(v => {
    if (v > maxVal) return;
    const y = toY(v);
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
    ctx.fillStyle = '#445566';
    ctx.font = '10px JetBrains Mono, monospace';
    ctx.textAlign = 'right';
    ctx.fillText((v / 10000).toLocaleString() + '만', padL - 8, y + 4);
  });
  ctx.setLineDash([]);

  // 목표선
  const goalY = toY(GOAL);
  ctx.strokeStyle = '#ffd54f';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([8, 4]);
  ctx.beginPath(); ctx.moveTo(padL, goalY); ctx.lineTo(W - padR, goalY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#ffd54f';
  ctx.font = 'bold 11px Noto Sans KR, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('🎯 목표 1,000만원', W - padR - 120, goalY - 8);

  // X축 라벨
  ctx.fillStyle = '#556677';
  ctx.font = '10px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  for (let i = 0; i < xCount; i++) {
    const x = toX(i);
    ctx.fillText(i === 0 ? '시작' : `${i * 10}일`, x, H - padB + 20);
    // 세로 그리드
    ctx.strokeStyle = 'rgba(50,70,100,0.15)';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(x, padT); ctx.lineTo(x, H - padB); ctx.stroke();
  }

  // 라인 그리기
  datasets.forEach((data, di) => {
    ctx.strokeStyle = COLORS[di];
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    data.forEach((v, i) => {
      const x = toX(i), y = toY(v);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    // 포인트
    data.forEach((v, i) => {
      const x = toX(i), y = toY(v);
      ctx.fillStyle = COLORS[di];
      ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#0a0f1e';
      ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI * 2); ctx.fill();
    });

    // 도달 시점 표시
    const reachIdx = data.findIndex(v => v >= GOAL);
    if (reachIdx > 0) {
      const rx = toX(reachIdx), ry = toY(data[reachIdx]);
      ctx.fillStyle = COLORS[di];
      ctx.beginPath(); ctx.arc(rx, ry, 7, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 8px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('✓', rx, ry + 3);
      // 라벨
      ctx.fillStyle = COLORS[di];
      ctx.font = 'bold 11px Noto Sans KR, sans-serif';
      ctx.fillText(`${reachIdx * 10}일`, rx, ry - 14);
    }
  });
}

drawChart();
window.addEventListener('resize', () => { ctx.setTransform(1,0,0,1,0,0); drawChart(); });

// 범례
const legendEl = document.getElementById('legend');
LABELS.forEach((l, i) => {
  const reachIdx = datasets[i].findIndex(v => v >= GOAL);
  const days = reachIdx > 0 ? `${reachIdx * 10}일` : '미도달';
  legendEl.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${COLORS[i]}"></div><span>${l} 시작 → <strong>${days}</strong></span></div>`;
});

// 테이블
const thead = document.querySelector('#dataTable thead tr');
LABELS.forEach(l => { thead.innerHTML += `<th>${l}</th>`; });

const tbody = document.querySelector('#dataTable tbody');
for (let i = 0; i < maxRounds; i++) {
  let row = `<td style="color:#6688aa;">${i === 0 ? '시작' : `${i}회 (${i*10}일)`}</td>`;
  datasets.forEach((data, di) => {
    const v = data[i];
    const reached = v >= GOAL;
    const formatted = (v / 10000).toLocaleString(undefined, {maximumFractionDigits:0}) + '만원';
    row += `<td class="${reached ? 'highlight' : ''}" style="color:${COLORS[di]}">${formatted}${reached && (i === 0 || data[i-1] < GOAL) ? ' 🎯' : ''}</td>`;
  });
  tbody.innerHTML += `<tr>${row}</tr>`;
}
</script>
</body>
</html>
